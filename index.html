<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wash Lover Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = { darkMode: 'class' }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #F8FAFC;
            transition: background 0.3s, color 0.3s;
        }

        /* Dark Mode Classes */
        body.dark {
            background-color: #0f172a;
            color: #f1f5f9;
        }

        body.dark .card {
            background: #1e293b;
            border: 1px solid #334155;
        }

        body.dark .text-slate-800 {
            color: #f8fafc;
        }

        body.dark .text-slate-700 {
            color: #cbd5e1;
        }

        body.dark .text-slate-500 {
            color: #94a3b8;
        }

        body.dark .bg-slate-100 {
            background: #334155;
            color: #f8fafc;
        }

        body.dark .bg-white {
            background: #1e293b;
        }

        body.dark .border-b {
            border-color: #334155;
        }

        body.dark tr:hover {
            background-color: #334155 !important;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        body.dark #loading-overlay {
            background: rgba(15, 23, 42, 0.9);
        }

        .spinner-logo {
            width: 80px;
            animation: spin 1.5s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg) scale(1);
            }

            50% {
                transform: rotate(180deg) scale(1.2);
            }

            100% {
                transform: rotate(360deg) scale(1);
            }
        }
    </style>
</head>

<body class="p-4 md:p-8">

    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <img src="https://i.ibb.co/v6F6dNMf/logo-removebg-preview.png" class="spinner-logo" alt="Loading...">
        <p class="mt-4 font-bold text-pink-500 animate-pulse">กำลังซักข้อมูลให้คุณ...</p>
    </div>

    <div class="max-w-7xl mx-auto">

        <!-- Header & Filter -->
        <div class="card p-6 mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-3xl font-bold flex items-center gap-3">
                <img src="https://i.ibb.co/v6F6dNMf/logo-removebg-preview.png" alt="Logo" class="h-12 w-auto">
                <span class="text-blue-500">Wash</span><span class="text-pink-500">lover</span>
            </h1>

            <div class="flex flex-wrap gap-2 items-center justify-center">
                <div id="customDateWrapper" class="hidden flex flex-col md:flex-row gap-2 items-center">
                    <div
                        class="flex items-center gap-2 bg-slate-100 dark:bg-slate-700 rounded-xl px-3 py-1.5 border border-slate-200 dark:border-slate-600">
                        <span class="text-[10px] text-slate-400 font-bold uppercase">จาก:</span>
                        <input type="date" id="customDateStart"
                            class="bg-transparent border-none text-slate-700 dark:text-white text-sm focus:outline-none">
                    </div>
                    <div
                        class="flex items-center gap-2 bg-slate-100 dark:bg-slate-700 rounded-xl px-3 py-1.5 border border-slate-200 dark:border-slate-600">
                        <span class="text-[10px] text-slate-400 font-bold uppercase">ถึง:</span>
                        <input type="date" id="customDateEnd"
                            class="bg-transparent border-none text-slate-700 dark:text-white text-sm focus:outline-none">
                    </div>
                </div>

                <select id="timeFilter" onchange="checkFilter()"
                    class="bg-slate-100 rounded-xl px-4 py-2 border-none text-slate-700 font-semibold focus:ring-2 focus:ring-pink-300 dark:bg-slate-700 dark:text-white">
                    <option value="daily">วันนี้</option>
                    <option value="weekly">ย้อนหลัง 7 วัน</option>
                    <option value="monthly">ย้อนหลัง 30 วัน</option>
                    <option value="custom">ระบุวันที่...</option>
                </select>

                <button id="btnSearchCustom" onclick="fetchData()"
                    class="bg-pink-500 text-white px-4 py-2 rounded-xl hidden hover:bg-pink-600 transition">ค้นหา</button>

                <button id="theme-toggle-btn" onclick="toggleDarkMode()"
                    class="p-2 bg-slate-200 dark:bg-slate-700 rounded-xl text-xl transition-all duration-300">
                    🌙
                </button>
            </div>
        </div>

        <!-- Stat Cards -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="card p-6 border-b-4 border-pink-500">
                <p class="text-sm text-slate-500 font-medium">รายได้รวม</p>
                <h3 id="statCoins" class="text-2xl font-bold text-slate-800 mt-1">0 ฿</h3>
            </div>
            <div class="card p-6 border-b-4 border-blue-500">
                <p class="text-sm text-slate-500 font-medium">รอบทำงานรวม</p>
                <h3 id="statJobs" class="text-2xl font-bold text-slate-800 mt-1">0 ครั้ง</h3>
            </div>
            <div class="card p-6 border-b-4 border-sky-400">
                <p class="text-sm text-slate-500 font-medium">เครื่องซัก</p>
                <h3 id="statWasher" class="text-2xl font-bold text-slate-800 mt-1">0 ครั้ง</h3>
            </div>
            <div class="card p-6 border-b-4 border-orange-400">
                <p class="text-sm text-slate-500 font-medium">เครื่องอบ</p>
                <h3 id="statDryer" class="text-2xl font-bold text-slate-800 mt-1">0 ครั้ง</h3>
            </div>
        </div>

        <!-- แถวใหม่: กราฟเส้นวิเคราะห์ช่วงเวลาทำเงิน Peak Hours (Full-Width) -->
        <div class="card p-6 mb-6">
            <h2 class="text-lg font-bold mb-4 text-slate-700 w-full text-left">วิเคราะห์ช่วงเวลาการทำรายได้สะสม (Peak
                Hours Analytics)</h2>
            <div class="w-full relative h-[300px] md:h-[350px]">
                <canvas id="peakHoursLineChart"></canvas>
            </div>
        </div>

        <!-- Charts Row (Doughnut + Horizontal Bar) -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
            <!-- กราฟวงกลมเดิม -->
            <div class="card p-6 lg:col-span-1 flex flex-col justify-center items-center">
                <h2 class="text-lg font-bold mb-4 text-slate-700 w-full text-left">สัดส่วนการใช้งาน</h2>
                <div class="w-full max-w-[200px] md:max-w-[230px]"><canvas id="doughnutChart"></canvas></div>
            </div>

            <!-- กราฟแท่งแนวนอนตัวเดิม -->
            <div class="card p-6 lg:col-span-2 flex flex-col justify-between">
                <h2 class="text-lg font-bold mb-4 text-slate-700 w-full text-left">รายได้แยกตามเครื่อง (฿)</h2>
                <div class="w-full relative flex-1 min-h-[420px]">
                    <canvas id="horizontalBarChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Transaction Table Full Width -->
        <div class="card p-6 overflow-x-auto max-h-[450px] overflow-y-auto">
            <h2 class="text-lg font-bold mb-4 text-slate-700">ประวัติการทำงานล่าสุด</h2>
            <table class="w-full text-left relative">
                <thead class="sticky top-0 bg-white dark:bg-[#1e293b] z-10">
                    <tr class="text-slate-400 border-b">
                        <th class="pb-3">วันที่ / เวลา</th>
                        <th class="pb-3">อุปกรณ์</th>
                        <th class="pb-3">สถานะ</th>
                        <th class="pb-3 text-right">ยอด (฿)</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const APP_URL = 'https://script.google.com/macros/s/AKfycbyJEr_ofrb2WpwQTknQhVzaRrKw78wkv0uw76_mIlTtrv-kJiH1KbzveKIPM68162xCfQ/exec';
        let doughnutChartInstance = null;
        let barChartInstance = null;
        let lineChartInstance = null;

        let cacheData = {
            washer: 0,
            dryer: 0,
            deviceLabels: [],
            deviceTotals: [],
            washerHourly: Array(24).fill(0),
            dryerHourly: Array(24).fill(0)
        };

        async function fetchData() {
            const loader = document.getElementById('loading-overlay');
            loader.style.display = 'flex'; loader.style.opacity = '1';
            try {
                const dates = getDateRange();
                const res = await fetch(`${APP_URL}?start=${dates.start}&end=${dates.end}`);
                const data = await res.json();

                document.getElementById('statCoins').innerText = (data.stats.total_income || 0).toLocaleString() + ' ฿';
                document.getElementById('statJobs').innerText = (data.stats.total_jobs || 0).toLocaleString() + ' ครั้ง';
                document.getElementById('statWasher').innerText = (data.stats.washer || 0).toLocaleString() + ' ครั้ง';
                document.getElementById('statDryer').innerText = (data.stats.dryer || 0).toLocaleString() + ' ครั้ง';

                document.getElementById('tableBody').innerHTML = data.transactions?.length ? data.transactions.map(t => `
                    <tr class="border-b text-sm hover:bg-slate-50 transition">
                        <td class="py-3 text-slate-500">${t.timestamp.substring(0, 16)}</td>
                        <td class="py-3 font-medium ${t.device_name.includes('อบ') ? 'text-orange-600 dark:text-orange-400' : 'text-sky-600 dark:text-sky-400'}">${t.device_name}</td>
                        <td class="py-3"><span class="bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400 px-2 py-1 rounded-full text-xs">ทำงาน</span></td>
                        <td class="py-3 text-right font-bold text-pink-500">+${t.income_baht || 0}</td>
                    </tr>`).join('') : '<tr><td colspan="4" class="text-center py-4 text-slate-400">ไม่พบข้อมูล</td></tr>';

                const deviceIncomeMap = {};
                const washerHourly = Array(24).fill(0);
                const dryerHourly = Array(24).fill(0);

                data.transactions?.forEach(t => {
                    const income = parseFloat(t.income_baht) || 0;
                    if (income > 0) {
                        deviceIncomeMap[t.device_name] = (deviceIncomeMap[t.device_name] || 0) + income;
                    }

                    // แยกชั่วโมงสะสม (00:00 - 23:00) ตามประเภทเครื่อง
                    const hour = parseInt(t.timestamp.substring(11, 13));
                    if (!isNaN(hour) && hour >= 0 && hour < 24) {
                        if (t.device_name.includes('อบ')) {
                            dryerHourly[hour] += income;
                        } else {
                            washerHourly[hour] += income;
                        }
                    }
                });

                const sortedDevices = Object.entries(deviceIncomeMap)
                    .map(([name, total]) => ({ name, total }))
                    .sort((a, b) => {
                        const isAWasher = a.name.includes('ซัก');
                        const isBWasher = b.name.includes('ซัก');

                        if (isAWasher && !isBWasher) return -1;
                        if (!isAWasher && isBWasher) return 1;

                        const numA = parseInt(a.name.match(/\d+$/)?.[0] || 0);
                        const numB = parseInt(b.name.match(/\d+$/)?.[0] || 0);
                        return numA - numB;
                    });

                cacheData.washer = data.stats.washer || 0;
                cacheData.dryer = data.stats.dryer || 0;
                cacheData.deviceLabels = sortedDevices.map(d => d.name);
                cacheData.deviceTotals = sortedDevices.map(d => d.total);
                cacheData.washerHourly = washerHourly;
                cacheData.dryerHourly = dryerHourly;

                updateCharts();
            } catch (err) { console.error(err); }
            finally { loader.style.opacity = '0'; setTimeout(() => loader.style.display = 'none', 500); }
        }

        function checkFilter() {
            const isCustom = document.getElementById('timeFilter').value === 'custom';
            const wrapper = document.getElementById('customDateWrapper');

            wrapper.classList.toggle('hidden', !isCustom);
            wrapper.classList.toggle('flex', isCustom);
            document.getElementById('btnSearchCustom').classList.toggle('hidden', !isCustom);

            if (!isCustom) fetchData();
        }

        function getDateRange() {
            const f = document.getElementById('timeFilter').value;
            const t = new Date(), s = new Date();
            if (f === 'weekly') s.setDate(t.getDate() - 7);
            if (f === 'monthly') s.setDate(t.getDate() - 30);
            if (f === 'custom') { return { start: document.getElementById('customDateStart').value, end: document.getElementById('customDateEnd').value }; }
            const fd = (d) => d.toISOString().split('T')[0];
            return { start: fd(s), end: fd(t) };
        }

        function updateCharts() {
            const isDark = document.body.classList.contains('dark');
            const textColor = isDark ? '#f1f5f9' : '#334155';
            const gridColor = isDark ? '#334155' : '#e2e8f0';

            // --- 1. กราฟวงกลมเดิม ---
            if (doughnutChartInstance) doughnutChartInstance.destroy();
            doughnutChartInstance = new Chart(document.getElementById('doughnutChart').getContext('2d'), {
                type: 'doughnut',
                data: {
                    labels: ['เครื่องซัก', 'เครื่องอบ'],
                    datasets: [{ data: [cacheData.washer, cacheData.dryer], backgroundColor: ['#38bdf8', '#fb923c'] }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: textColor, font: { family: 'Kanit' } } } }
                }
            });

            // --- 2. กราฟเส้น Area Chart ตัวใหม่ (วิเคราะห์ชั่วโมง Peak สะสม) ---
            if (lineChartInstance) lineChartInstance.destroy();
            const ctxLine = document.getElementById('peakHoursLineChart').getContext('2d');

            // สร้าง Gradient สวยๆ ใต้เส้นกราฟ
            let gradWasher = ctxLine.createLinearGradient(0, 0, 0, 300);
            gradWasher.addColorStop(0, 'rgba(56, 189, 248, 0.25)');
            gradWasher.addColorStop(1, 'rgba(56, 189, 248, 0.0)');

            let gradDryer = ctxLine.createLinearGradient(0, 0, 0, 300);
            gradDryer.addColorStop(0, 'rgba(251, 146, 60, 0.25)');
            gradDryer.addColorStop(1, 'rgba(251, 146, 60, 0.0)');

            lineChartInstance = new Chart(ctxLine, {
                type: 'line',
                data: {
                    labels: Array.from({ length: 24 }, (_, i) => String(i).padStart(2, '0') + ':00'),
                    datasets: [
                        {
                            label: 'เครื่องซักผ้า',
                            data: cacheData.washerHourly,
                            borderColor: '#38bdf8',
                            backgroundColor: gradWasher,
                            fill: true,
                            tension: 0.4,
                            pointBackgroundColor: '#38bdf8',
                            pointHoverRadius: 6
                        },
                        {
                            label: 'เครื่องอบผ้า',
                            data: cacheData.dryerHourly,
                            borderColor: '#fb923c',
                            backgroundColor: gradDryer,
                            fill: true,
                            tension: 0.4,
                            pointBackgroundColor: '#fb923c',
                            pointHoverRadius: 6
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: textColor, font: { family: 'Kanit' } } },
                        tooltip: { callbacks: { label: (ctx) => ` รายได้สะสม: ${ctx.raw} ฿` } }
                    },
                    scales: {
                        x: {
                            grid: { color: gridColor },
                            ticks: { color: textColor, font: { family: 'Kanit' }, maxRotation: 45, minRotation: 45 }
                        },
                        y: {
                            grid: { color: gridColor },
                            ticks: { color: textColor, font: { family: 'Kanit' } },
                            beginAtZero: true
                        }
                    }
                }
            });

            // --- 3. กราฟแท่งแนวนอนตัวเดิม ---
            if (barChartInstance) barChartInstance.destroy();
            const themeColors = ['#facc15', '#f97316', '#ef4444', '#c026d3', '#2563eb', '#06b6d4', '#84cc16'];
            const backgroundColors = cacheData.deviceLabels.map((_, i) => themeColors[i % themeColors.length]);

            barChartInstance = new Chart(document.getElementById('horizontalBarChart').getContext('2d'), {
                type: 'bar',
                data: {
                    labels: cacheData.deviceLabels,
                    datasets: [{
                        data: cacheData.deviceTotals,
                        backgroundColor: backgroundColors,
                        borderRadius: 20,
                        borderSkipped: false,
                        barThickness: 12
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: { callbacks: { label: (ctx) => ` รายได้: ${ctx.raw} ฿` } }
                    },
                    scales: {
                        x: {
                            grid: { color: gridColor },
                            ticks: { color: textColor, font: { family: 'Kanit' } }
                        },
                        y: {
                            grid: { display: false },
                            ticks: { color: textColor, font: { family: 'Kanit' } }
                        }
                    }
                }
            });
        }

        fetchData();

        function toggleDarkMode() {
            const body = document.body;
            const btn = document.getElementById('theme-toggle-btn');
            body.classList.toggle('dark');
            btn.innerText = body.classList.contains('dark') ? '☀️' : '🌙';
            updateCharts();
        }
    </script>
</body>

</html>
